<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Student</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="sanfelipe.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>
  <script src="script.js"></script>
</head>
<body class="bg-gray-100">
  <navbar-component></navbar-component>

  <main class="container mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow-md p-6 max-w-3xl mx-auto">
      <h1 class="text-2xl font-bold text-gray-800 mb-4">Register New Student</h1>
      
      <form id="register-form" autocomplete="off" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-group">
            <label for="first-name" class="form-label">First Name</label>
            <input type="text" id="first-name" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="last-name" class="form-label">Last Name</label>
            <input type="text" id="last-name" class="form-input" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="age" class="form-label">Age</label>
          <input type="text" id="age" class="form-input" inputmode="numeric" pattern="[0-9]*" required>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-group">
            <label for="grade" class="form-label">Grade Level</label>
            <input type="text" id="grade" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="section" class="form-label">Section</label>
            <input type="text" id="section" class="form-input" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="department" class="form-label">School Department</label>
          <select id="department" name="department" class="form-input" required>
            <option value="">Select Department</option>
            <option value="Kinder">Kinder</option>
            <option value="Elementary">Elementary</option>
            <option value="Junior High School">Junior High School</option>
            <option value="Senior High School">Senior High School</option>
          </select>
        </div>
        
        <button type="submit" class="btn w-full">
          <i data-feather="save" class="mr-2"></i> Register Student
        </button>
      </form>
      
      <div id="registration-success" class="alert alert-success mt-6 hidden">
        <p>Student registered successfully! Below is their unique QR code.</p>
      </div>
      
      <div id="qr-section" class="mt-6 text-center">
        <div class="mb-2">
          <strong>Student ID:</strong> <span id="student-id"></span>
        </div>
        <canvas id="student-qr" class="qr-code"></canvas>
        <div class="mt-4">
          <button onclick="window.print()" class="btn mr-2">
            <i data-feather="printer" class="mr-2"></i> Print QR Code
          </button>
          <a href="index.html" class="btn btn-secondary">
            <i data-feather="home" class="mr-2"></i> Return Home
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer-component></footer-component>
  <script>feather.replace();</script>
</body>
</html>
