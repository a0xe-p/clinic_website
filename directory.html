<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Directory</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="sanfelipe.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>
  <script src="script.js"></script>
</head>
<body class="bg-gray-100">
  <navbar-component></navbar-component>

  <main class="container mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow-md p-6">
      <h1 class="text-2xl font-bold text-gray-800 mb-4">Student Directory</h1>
      
      <form id="filter-form" class="mb-6 bg-gray-50 p-4 rounded-lg">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="form-group">
            <label for="filter-department" class="form-label">Department</label>
            <select id="filter-department" class="form-input">
              <option value="">All Departments</option>
              <option value="Kinder">Kinder</option>
              <option value="Elementary">Elementary</option>
              <option value="Junior High School">Junior High School</option>
              <option value="Senior High School">Senior High School</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="filter-grade" class="form-label">Grade Level</label>
            <input type="text" id="filter-grade" class="form-input" placeholder="Filter by grade">
          </div>
          
          <div class="form-group">
            <label for="filter-section" class="form-label">Section</label>
            <input type="text" id="filter-section" class="form-input" placeholder="Filter by section">
          </div>
        </div>
        
        <button type="submit" class="btn mt-4">
          <i data-feather="filter" class="mr-2"></i> Filter Students
        </button>
      </form>
      
      <div class="overflow-x-auto">
        <table class="table w-full">
          <thead>
            <tr>
              <th>Student ID</th>
              <th>Name</th>
              <th>Age</th>
              <th>Grade-Section</th>
              <th>Department</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="student-table-body">
            <!-- Students will be populated here by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer-component></footer-component>
  <script>
    feather.replace();
  </script>
</body>
</html>
